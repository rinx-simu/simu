<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RINX VIRTUAL REMOVAL SIMULATOR</title>

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rinx: {
                            gold: '#c5a059',
                            dark: '#111111',
                            gray: '#333333',
                            light: '#f9f9f9',
                            white: '#ffffff',
                            text: '#222222'
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        serif: ['"Cinzel"', 'serif'],
                        mincho: ['"Noto Serif JP"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #ffffff;
            color: #222222;
            overflow: hidden;
            /* Lock scroll for iPad app-feel */
        }

        .gold-line {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #c5a059 50%, transparent 100%);
            width: 100%;
        }

        /* Custom Range Input (Clean Light Theme) */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            border: 2px solid #c5a059;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e0e0e0;
            border-radius: 2px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #c5a059;
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        .loader::after {
            content: '';
            box-sizing: border-box;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: #c5a059;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn-gold {
            background: #c5a059;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background: #b08d4b;
            box-shadow: 0 4px 12px rgba(197, 160, 89, 0.3);
        }

        .btn-outline {
            border: 1px solid #c5a059;
            color: #c5a059;
            background: transparent;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: rgba(197, 160, 89, 0.1);
        }

        /* iPad landscape optimization */
        .canvas-container {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-radius: 4px;
            overflow: hidden;
            background: #f0f0f0;
        }
    </style>
</head>

    <script>
        // State
        let isModelLoaded = false;
        let originalImageData = null; // ImageData object
        let landmarks = null;
        let skinColor = null;
        let noiseTexture = null;
        let currentImgElement = null; // Store temp image for resizing logic

        // DOM Elements
        const mainCanvas = document.getElementById('mainCanvas');
        const beforeCanvas = document.getElementById('beforeCanvas');
        const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: true });
        const beforeCtx = beforeCanvas.getContext('2d');

        const fileInput = document.getElementById('imageUpload');
        const fileInputHero = document.getElementById('imageUploadHero');
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityDisplay = document.getElementById('intensityValue');

        const heroPlaceholder = document.getElementById('heroPlaceholder');
        const simulatorView = document.getElementById('simulatorView');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // --- Init ---
        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                isModelLoaded = true;
                console.log("Models Loaded");
            } catch (e) {
                console.error(e);
                alert("AIモデルの読み込みに失敗しました。リロードしてください。");
            }
        }
        init();

        // --- Logic ---
        const handleFile = (e) => {
            if (e.target.files && e.target.files[0]) {
                loadImage(URL.createObjectURL(e.target.files[0]));
            }
        };
        // Removed header file input listener
        fileInputHero.addEventListener('change', handleFile);

        function loadImage(url) {
            if (!isModelLoaded) return alert("準備中です");

            heroPlaceholder.style.opacity = '0';
            setTimeout(() => {
                heroPlaceholder.classList.add('hidden');
                simulatorView.classList.remove('pointer-events-none');
                simulatorView.classList.remove('opacity-0');
            }, 300);

            loadingOverlay.classList.remove('hidden');

            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = async () => {
                currentImgElement = img;
                await processImage(img);
            };
            img.src = url;
        }

        async function processImage(img) {
            try {
                // Fit Logic: Contain within the container
                // We use the container size to determine canvas size
                // For a side-by-side view, both canvases should match the image aspect ratio
                // but fit within their respective containers.

                // However, for FaceAPI and pixel manipulation to work easily, 
                // we usually set canvas size to exact image size (or scaled down) 
                // and let CSS handle the 'object-contain' display.
                // But FaceAPI results depend on coordinate space.

                // Approach:
                // 1. Calculate a reasonable processing resolution (max 1024px height/width? or keep original?)
                // Keeping original is best for quality, CSS handles view.

                let w = img.width;
                let h = img.height;

                // Limit max size for performance (iPad safari memory limit)
                const MAX_DIM = 2048;
                if (w > MAX_DIM || h > MAX_DIM) {
                    const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                    w = Math.floor(w * ratio);
                    h = Math.floor(h * ratio);
                }

                // Setup Canvases
                mainCanvas.width = w;
                mainCanvas.height = h;
                beforeCanvas.width = w;
                beforeCanvas.height = h;

                // Draw Initial State
                mainCtx.drawImage(img, 0, 0, w, h);
                beforeCtx.drawImage(img, 0, 0, w, h); // Before view stays static

                originalImageData = mainCtx.getImageData(0, 0, w, h);

                // Detect Faces
                const detections = await faceapi.detectAllFaces(mainCanvas, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

                if (!detections || detections.length === 0) {
                    alert("顔が見つかりませんでした");
                    loadingOverlay.classList.add('hidden');
                    return;
                }

                landmarks = detections[0].landmarks;
                setupCorrectionData(); // Calculate skin color

                // Reset Slider
                updateSlider(0);
                loadingOverlay.classList.add('hidden');

            } catch (e) {
                console.error(e);
                alert("エラーが発生しました: " + e.message);
                loadingOverlay.classList.add('hidden');
            }
        }

        function updateSlider(val) {
            intensitySlider.value = val;
            intensityDisplay.innerText = val + "%";
            window.requestAnimationFrame(() => render(val / 100));
        }

        // --- Skin Color Logic (V5/V7) ---
        function setupCorrectionData() {
            if (!landmarks) return;
            const leftEye = landmarks.getLeftEye();
            const rightEye = landmarks.getRightEye();

            // Sampling areas
            const lRect = { x: Math.floor(leftEye[0].x), y: Math.floor(leftEye[5].y + 10), w: 20, h: 20 };
            const rRect = { x: Math.floor(rightEye[3].x - 20), y: Math.floor(rightEye[4].y + 10), w: 20, h: 20 };

            const c1 = getAvgColor(lRect);
            const c2 = getAvgColor(rRect);

            // Choose brighter skin tone
            const luma1 = 0.299 * c1.r + 0.587 * c1.g + 0.114 * c1.b;
            const luma2 = 0.299 * c2.r + 0.587 * c2.g + 0.114 * c2.b;
            const best = (luma1 > luma2) ? c1 : c2;

            skinColor = `rgb(${best.r}, ${best.g}, ${best.b})`;

            // Noise Texture
            noiseTexture = createNoiseTexture(mainCanvas.width, mainCanvas.height, 0.45);
        }

        function getAvgColor(r) {
            try {
                const data = mainCtx.getImageData(r.x, r.y, r.w, r.h).data;
                let R = 0, G = 0, B = 0, count = 0;
                for (let i = 0; i < data.length; i += 4) {
                    R += data[i]; G += data[i + 1]; B += data[i + 2]; count++;
                }
                return count ? { r: R / count, g: G / count, b: B / count } : { r: 220, g: 180, b: 160 };
            } catch (e) { return { r: 220, g: 180, b: 160 }; }
        }

        // --- Render V7.4 Logic (iPad Bug Fix - Manual Blur) ---
        function applyManualBlur(ctx, width, height, radius) {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            const w = width;
            const h = height;

            // Simple Box Blur implementation (faster than Gaussian for manual calc)
            // Need to do this horizontally then vertically
            const passes = 2; // more passes = closer to gaussian, but slower

            // Create temporary buffer to avoid allocating inside loop
            const temp = new Uint8ClampedArray(data.length);

            for (let pass = 0; pass < passes; pass++) {
                // Horizontal pass
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        let r = 0, g = 0, b = 0, a = 0, count = 0;
                        for (let ix = -radius; ix <= radius; ix++) {
                            const curX = x + ix;
                            if (curX >= 0 && curX < w) {
                                const idx = (y * w + curX) * 4;
                                r += data[idx];
                                g += data[idx + 1];
                                b += data[idx + 2];
                                a += data[idx + 3];
                                count++;
                            }
                        }
                        const outIdx = (y * w + x) * 4;
                        temp[outIdx] = r / count;
                        temp[outIdx + 1] = g / count;
                        temp[outIdx + 2] = b / count;
                        temp[outIdx + 3] = a / count;
                    }
                }

                // Vertical pass
                for (let x = 0; x < w; x++) {
                    for (let y = 0; y < h; y++) {
                        let r = 0, g = 0, b = 0, a = 0, count = 0;
                        for (let iy = -radius; iy <= radius; iy++) {
                            const curY = y + iy;
                            if (curY >= 0 && curY < h) {
                                const idx = (curY * w + x) * 4;
                                r += temp[idx];
                                g += temp[idx + 1];
                                b += temp[idx + 2];
                                a += temp[idx + 3];
                                count++;
                            }
                        }
                        const outIdx = (y * w + x) * 4;
                        data[outIdx] = r / count;
                        data[outIdx + 1] = g / count;
                        data[outIdx + 2] = b / count;
                        data[outIdx + 3] = a / count;
                    }
                }
            }

            ctx.putImageData(imgData, 0, 0);
        }

        function applySafeBlur(targetCtx, sourceCanvas, radius) {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.userAgent.includes("Mac") && "ontouchend" in document);

            if (isIOS) {
                // For iOS, completely avoid ctx.filter and use manual pixel manipulation
                // Downscale massively to make manual blur performant enough
                const scale = 0.25;
                const dw = Math.max(1, Math.floor(sourceCanvas.width * scale));
                const dh = Math.max(1, Math.floor(sourceCanvas.height * scale));

                const tmp = createOffscreenCanvas(dw, dh);
                tmp.ctx.drawImage(sourceCanvas, 0, 0, dw, dh);

                // Apply manual CPU-based blur
                applyManualBlur(tmp.ctx, dw, dh, Math.max(1, Math.floor(radius * scale)));

                // Draw back scaled up (browser handles interpolation)
                targetCtx.drawImage(tmp.canvas, 0, 0, sourceCanvas.width, sourceCanvas.height);
            } else {
                targetCtx.save();
                targetCtx.filter = `blur(${radius}px)`;
                targetCtx.drawImage(sourceCanvas, 0, 0, sourceCanvas.width, sourceCanvas.height);
                targetCtx.restore();
            }
        }

        function createMaskPath(ctx, w, h, points, isClosed = true) {
            ctx.beginPath();
            if (points && points.length > 0) {
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                if (isClosed) ctx.closePath();
            }
        }

        function render(alpha) {
            if (!originalImageData || !landmarks) return;

            // 1. Reset
            mainCtx.putImageData(originalImageData, 0, 0);
            if (alpha <= 0) return;

            const t = alpha;
            const jaw = landmarks.getJawOutline();
            const nose = landmarks.getNose();
            const leftEye = landmarks.getLeftEye();
            const rightEye = landmarks.getRightEye();
            const mouth = landmarks.getMouth();

            const w = mainCanvas.width;
            const h = mainCanvas.height;
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.userAgent.includes("Mac") && "ontouchend" in document);

            // Calculate center of face (approximate) - 鼻先（nose[3]）を正しい基準点に使用
            const noseTip = nose[3];

            // Create solid filled mask for the beard area
            const beardMask = createOffscreenCanvas(w, h);

            // 輪郭からのはみ出しを防ぎつつ、あご先（6〜10）だけ外側に拡張して黒残りを防ぐ
            const beardShape = [];
            for (let i = 0; i <= 16; i++) {
                const p = jaw[i];
                if (i >= 6 && i <= 10) {
                    const dx = p.x - noseTip.x;
                    const dy = p.y - noseTip.y;
                    // アゴの底面だけ0.06（6%）外側に広げる
                    beardShape.push({ x: p.x + dx * 0.06, y: p.y + dy * 0.06 });
                } else {
                    beardShape.push({ x: p.x, y: p.y });
                }
            }

            // 頬上部（目の下付近）の境界を馴染ませるため、ベースマスクと頬上部マスクを分けて作成する
            // 1. ベースのマスク（アゴ〜口周り・頬下部）
            beardShape.push({ x: jaw[16].x, y: nose[8].y }); 
            beardShape.push({ x: nose[8].x, y: nose[8].y + 5 });
            
            // 鼻下
            beardShape.push({ x: nose[6].x, y: nose[6].y + 2 });
            beardShape.push({ x: nose[4].x, y: nose[4].y + 5 });
            
            // 画像左側の頬・アゴへ
            beardShape.push({ x: jaw[0].x, y: nose[4].y });

            createMaskPath(beardMask.ctx, w, h, beardShape);
            beardMask.ctx.fillStyle = 'rgba(255, 255, 255, 1)';
            beardMask.ctx.fill();

            // 2. 頬上部（目の下付近）専用のマスクを作成し、強くぼかして重ねることでグラデーション状に馴染ませる
            // 左右のランドマークのねじれ（Criss-Cross）を完全に修正し、完全に対称なマスクを生成
            const cheekMask = createOffscreenCanvas(w, h);
            
            // 【画面左側】の頬（jaw[0], rightEye, nose[4] を使用）
            const leftCheek = [
                { x: nose[4].x, y: nose[4].y - 5 },
                { x: rightEye[3].x, y: Math.max(rightEye[4].y, rightEye[5].y) + 30 }, // 涙袋に入らないよう +18 から +30 に下げる
                { x: jaw[0].x, y: Math.max(rightEye[4].y, rightEye[5].y) + 30 }, // 眼の下の高さで顔の輪郭へ
                { x: jaw[0].x, y: nose[4].y }
            ];
            createMaskPath(cheekMask.ctx, w, h, leftCheek);
            cheekMask.ctx.fillStyle = 'rgba(255, 255, 255, 1)';
            cheekMask.ctx.fill();
            
            // 【画面右側】の頬（jaw[16], leftEye, nose[8] を使用）
            const rightCheek = [
                { x: jaw[16].x, y: nose[8].y },
                { x: jaw[16].x, y: Math.max(leftEye[4].y, leftEye[5].y) + 30 }, // 眼の下の高さで顔の輪郭へ
                { x: leftEye[0].x, y: Math.max(leftEye[4].y, leftEye[5].y) + 30 }, // 涙袋に入らないよう +18 から +30 に下げる
                { x: nose[8].x, y: nose[8].y - 5 } 
            ];
            createMaskPath(cheekMask.ctx, w, h, rightCheek);
            cheekMask.ctx.fillStyle = 'rgba(255, 255, 255, 1)';
            cheekMask.ctx.fill();

            // 頬上部だけ強いぼかし（半径30）を適用し、メインマスクに合成
            const blurredCheeks = createOffscreenCanvas(w, h);
            applySafeBlur(blurredCheeks.ctx, cheekMask.canvas, 30);
            
            beardMask.ctx.drawImage(blurredCheeks.canvas, 0, 0);

            // Clear out lips and nose from the mask
            beardMask.ctx.globalCompositeOperation = 'destination-out';
            const outerLip = mouth.slice(0, 12);
            createMaskPath(beardMask.ctx, w, h, outerLip);
            beardMask.ctx.fillStyle = 'rgba(0,0,0,1)';
            beardMask.ctx.fill();

            // 鼻下側（上唇）はキワまで補正を効かせるため保護ストロークを描かない。
            // 下唇と口角（mouthの6〜11、および0）にのみ保護ストロークを追加し、肌と同化するのを防ぐ。
            beardMask.ctx.beginPath();
            beardMask.ctx.moveTo(mouth[6].x, mouth[6].y);
            for (let i = 7; i < 12; i++) {
                beardMask.ctx.lineTo(mouth[i].x, mouth[i].y);
            }
            beardMask.ctx.lineTo(mouth[0].x, mouth[0].y); // 口の左端まで
            
            beardMask.ctx.lineWidth = 30; // 唇が小さく見えないよう、18から30に拡大して横・下を広く保護
            beardMask.ctx.lineJoin = 'round';
            beardMask.ctx.strokeStyle = 'rgba(0,0,0,1)';
            beardMask.ctx.stroke();

            const noseShape = [nose[0], nose[4], { x: nose[6].x, y: nose[6].y + 5 }, nose[8]];
            createMaskPath(beardMask.ctx, w, h, noseShape);
            beardMask.ctx.fill();
            beardMask.ctx.lineWidth = 8;
            beardMask.ctx.stroke();

            beardMask.ctx.globalCompositeOperation = 'source-over';

            // Blur the hard edges of this mask strongly (Set to 10 for smooth blending without excessive bleeding)
            const finalMask = createOffscreenCanvas(w, h);
            applySafeBlur(finalMask.ctx, beardMask.canvas, 10);

            // ==========================================
            // Heavy Beard Removal Effect Logic
            // ==========================================
            const effectLayer = createOffscreenCanvas(w, h);

            // Step 1: "Melt" the dense hair. 
            const heavyBlurLayer = createOffscreenCanvas(w, h);
            heavyBlurLayer.ctx.drawImage(mainCanvas, 0, 0);
            applySafeBlur(heavyBlurLayer.ctx, heavyBlurLayer.canvas, 10);

            // Apply this blurred base to our effect layer
            effectLayer.ctx.drawImage(heavyBlurLayer.canvas, 0, 0);

            // Step 2: Targeted Mustache Boost (Lift dark blue/black shadows under nose)
            // We create a very soft, blurry white patch over the mustache to screen the shadows up
            const mustacheArea = createOffscreenCanvas(w, h);
            const mPath = [
                { x: nose[4].x - 15, y: nose[4].y },
                { x: nose[8].x + 15, y: nose[8].y },
                { x: mouth[6].x + 15, y: mouth[6].y + 25 }, // 下唇ラインまで大幅に拡張して上唇のキワのアルファ減衰を防ぐ
                { x: mouth[0].x - 15, y: mouth[0].y + 25 }
            ];
            createMaskPath(mustacheArea.ctx, w, h, mPath);
            mustacheArea.ctx.fillStyle = skinColor;
            mustacheArea.ctx.fill();

            // Blur it heavily so it's just a soft cloud of light
            const softMustache = createOffscreenCanvas(w, h);
            applySafeBlur(softMustache.ctx, mustacheArea.canvas, 15);

            // Apply the soft mustache lift (スクリーンで明るく飛ばす)
            effectLayer.ctx.globalCompositeOperation = 'screen';
            // 鼻下の黒残りを消すため0.80 -> 0.95に強化
            effectLayer.ctx.globalAlpha = Math.min(0.95, t * 0.95);
            effectLayer.ctx.drawImage(softMustache.canvas, 0, 0);

            // 追加: 仮想コンシーラー（青みを打ち消すオレンジ/ピーチ色）
            const concealerLayer = createOffscreenCanvas(w, h);
            concealerLayer.ctx.fillStyle = 'rgba(255, 150, 110, 1)'; // 青ヒゲを打ち消す暖色系
            concealerLayer.ctx.fillRect(0, 0, w, h);
            concealerLayer.ctx.globalCompositeOperation = 'destination-in';
            concealerLayer.ctx.drawImage(softMustache.canvas, 0, 0);

            // コンシーラーレイヤーをColor合成して根元の青グスミを解消する
            // べた塗り感を減らすため0.70 -> 0.40に低減
            effectLayer.ctx.globalCompositeOperation = 'color';
            effectLayer.ctx.globalAlpha = Math.min(0.40, t * 0.40);
            effectLayer.ctx.drawImage(concealerLayer.canvas, 0, 0);

            // 鼻下を物理的に厚塗りしてさらにカバーを強固にする
            effectLayer.ctx.globalCompositeOperation = 'normal';
            // 人中の陰影を残すため、限界の1.0から0.60へ大幅にトーンダウン
            effectLayer.ctx.globalAlpha = Math.min(0.60, t * 0.60);
            effectLayer.ctx.drawImage(softMustache.canvas, 0, 0);

            // Step 3: Global Shadow Lift (Reduced brightness to prevent bleeding)
            effectLayer.ctx.globalCompositeOperation = 'screen';
            effectLayer.ctx.fillStyle = skinColor;
            effectLayer.ctx.globalAlpha = Math.min(0.10, t * 0.10);
            effectLayer.ctx.fillRect(0, 0, w, h);

            // Step 3.5: Physical Skin Fill (塗りつぶし処理の強化)
            // Directly paint the skin color to cover hairs without brightening excessive areas
            effectLayer.ctx.globalCompositeOperation = 'normal';
            effectLayer.ctx.fillStyle = skinColor;
            effectLayer.ctx.globalAlpha = Math.min(0.35, t * 0.35);
            effectLayer.ctx.fillRect(0, 0, w, h);

            // Step 4: Recolor to match the face skin.
            effectLayer.ctx.globalCompositeOperation = 'soft-light';
            effectLayer.ctx.fillStyle = skinColor;
            effectLayer.ctx.globalAlpha = Math.min(0.50, t * 0.50);
            effectLayer.ctx.fillRect(0, 0, w, h);

            effectLayer.ctx.globalCompositeOperation = 'color';
            // Strong color override
            effectLayer.ctx.globalAlpha = Math.min(0.90, t * 0.90);
            effectLayer.ctx.fillRect(0, 0, w, h);

            // Step 5: Add artificial skin noise
            if (noiseTexture) {
                effectLayer.ctx.globalCompositeOperation = 'overlay';
                effectLayer.ctx.globalAlpha = 0.15;
                effectLayer.ctx.drawImage(noiseTexture, 0, 0);
            }

            // ==========================================
            // Masking and Compositing
            // ==========================================
            if (isIOS) {
                // Manual Alpha Masking via pixel manipulation
                const effectData = effectLayer.ctx.getImageData(0, 0, w, h);
                const maskData = finalMask.ctx.getImageData(0, 0, w, h);

                for (let i = 0; i < effectData.data.length; i += 4) {
                    effectData.data[i + 3] = (effectData.data[i + 3] * maskData.data[i]) / 255;
                }
                effectLayer.ctx.putImageData(effectData, 0, 0);

                mainCtx.globalAlpha = t;
                mainCtx.drawImage(effectLayer.canvas, 0, 0);
                mainCtx.globalAlpha = 1.0;
            } else {
                // PC / Modern Android
                effectLayer.ctx.globalCompositeOperation = 'destination-in';
                effectLayer.ctx.globalAlpha = 1.0;
                effectLayer.ctx.drawImage(finalMask.canvas, 0, 0);

                mainCtx.globalAlpha = t;
                mainCtx.drawImage(effectLayer.canvas, 0, 0);
                mainCtx.globalAlpha = 1.0;
            }
        }

        // --- Helpers ---
        intensitySlider.addEventListener('input', (e) => updateSlider(e.target.value));

        function resetApp() { window.location.reload(); }

        function createOffscreenCanvas(w, h) {
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            return { canvas: c, ctx: c.getContext('2d') };
        }

        function createNoiseTexture(w, h, amount) {
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const x = c.getContext('2d');
            const id = x.createImageData(w, h);
            const d = id.data;
            for (let i = 0; i < d.length; i += 4) {
                const v = 128 + (Math.random() - 0.5) * 255 * amount;
                d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
            }
            x.putImageData(id, 0, 0);
            return c;
        }

        // Camera Logic
        const cameraModal = document.getElementById('cameraModal');
        const videoEl = document.getElementById('videoElement');
        let stream = null;
        let currentFacingMode = 'user'; // 'user' (front) or 'environment' (back)

        // Add switch button dynamically (or we could have added to HTML, but let's just insert it here for safety to avoid matching errors)
        if (!document.getElementById('switchCameraBtn')) {
            const btn = document.createElement('button');
            btn.id = 'switchCameraBtn';
            btn.onclick = switchCamera;
            btn.className = 'absolute top-8 left-8 text-white p-4 hover:bg-white/10 rounded-full z-20';
            btn.title = 'Switch Camera';
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>`;
            document.getElementById('cameraModal').firstElementChild.appendChild(btn);
        }

        async function startCamera(facingMode = currentFacingMode) {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }

            try {
                const constraints = { video: { facingMode: facingMode } };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoEl.srcObject = stream;

                // Mirror video for front camera
                if (facingMode === 'user') {
                    videoEl.style.transform = 'scaleX(-1)';
                } else {
                    videoEl.style.transform = 'none';
                }

                currentFacingMode = facingMode;
                cameraModal.classList.remove('hidden');
            } catch (e) {
                console.error("Camera Error:", e);
                if (facingMode === 'environment') {
                    alert("アウトカメラへの切り替えに失敗しました。対応していない可能性があります。");
                    startCamera('user');
                } else {
                    alert("カメラへのアクセス設定をご確認ください。");
                }
            }
        }

        function switchCamera() {
            const newMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera(newMode);
        }

        // Expose for Hero Button
        window.startCameraFromHero = () => startCamera('user');

        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            cameraModal.classList.add('hidden');
        }

        document.getElementById('shutterBtn').addEventListener('click', () => {
            const c = document.createElement('canvas');
            c.width = videoEl.videoWidth; c.height = videoEl.videoHeight;
            const ctx = c.getContext('2d');

            if (currentFacingMode === 'user') {
                ctx.translate(c.width, 0);
                ctx.scale(-1, 1);
            }

            ctx.drawImage(videoEl, 0, 0);
            loadImage(c.toDataURL());
            closeCamera();
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'rinx_after.png';
            link.href = mainCanvas.toDataURL();
            link.click();
        });

    </script>
</body>
